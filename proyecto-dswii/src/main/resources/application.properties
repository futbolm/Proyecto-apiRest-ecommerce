spring.application.name=proyecto-dswii

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Puerto lo quitas o lo dejas, Railway asigna el suyo automáticamente
server.port=${PORT:8081}

# ── CONEXION MySQL Railway (variables de entorno) ──────────
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ── Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Groq ChatBot — variable de entorno Railway
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

# Brevo API
brevo.api.key=${BREVO_API_KEY}
brevo.from.email=shopzone855@gmail.com
brevo.from.name=ShopZone


